name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: build and publish binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          out="unity-ctx-${GOOS}-${GOARCH}"
          ver="${GITHUB_REF_NAME:-dev}"
          go build -ldflags "-s -w -X github.com/Kubonsang/unity-ctx/internal/version.Version=${ver}" -o "${out}" ./cmd/unity-ctx
          echo "ARTIFACT=${out}" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
